<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Silence VPN Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: rgba(255, 255, 255, 0.06);
            --accent-blue: #007AFF;
            --accent-purple: #6366f1;
        }

        body {
            background: radial-gradient(circle at top right, #1e1e2e, #0f0f12);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .gradient-text {
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-pulse {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 12px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .device-slot {
            width: 45px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .device-slot.active {
            background: var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-blue);
        }

        .copy-btn:active {
            transform: scale(0.95);
            transition: 0.1s;
        }

        /* Анимация появления контента */
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-8 fade-in-up">
        <div>
            <h1 class="text-2xl font-bold">Silence <span class="gradient-text">VPN</span></h1>
            <div class="flex items-center gap-2 mt-1">
                <div class="status-pulse"></div>
                <span class="text-xs text-gray-400 font-medium tracking-widest uppercase">Premium Protected</span>
            </div>
        </div>
        <div class="text-right">
            <span class="text-xs text-gray-500 block mb-1">Ping</span>
            <span class="text-sm font-mono text-green-400">24ms</span>
        </div>
    </header>

    <div class="glass-card p-6 mb-6 fade-in-up" style="animation-delay: 0.1s">
        <div class="flex justify-between items-start mb-6">
            <div>
                <p class="text-gray-400 text-sm mb-1">Истекает через</p>
                <h2 id="expiry_date" class="text-xl font-semibold">Загрузка...</h2>
            </div>
            <div class="bg-indigo-500/20 p-3 rounded-2xl">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between text-sm">
                <span class="text-gray-400">Трафик</span>
                <span id="traffic_usage" class="font-medium">0 GB / ∞</span>
            </div>
            <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                <div class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full w-[15%]"></div>
            </div>
        </div>
    </div>

    <div class="glass-card p-6 mb-6 fade-in-up" style="animation-delay: 0.2s">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-medium">Устройства</h3>
            <span class="text-xs bg-white/10 px-2 py-1 rounded-lg text-blue-400" id="device_count">1/5</span>
        </div>
        <div class="flex gap-2">
            <div class="device-slot active flex-1"></div>
            <div class="device-slot flex-1"></div>
            <div class="device-slot flex-1"></div>
            <div class="device-slot flex-1"></div>
            <div class="device-slot flex-1"></div>
        </div>
        <p class="text-[10px] text-gray-500 mt-3 uppercase tracking-wider text-center">Доступно еще 4 подключения</p>
    </div>

    <div class="glass-card p-6 mb-20 fade-in-up" style="animation-delay: 0.3s">
        <h3 class="text-sm text-gray-400 mb-3">Ваш персональный ключ</h3>
        <div class="bg-black/40 p-4 rounded-xl border border-white/5 break-all font-mono text-xs text-indigo-300 mb-4 select-all" id="vless_key">
            vless://empty...
        </div>
        <button onclick="copyKey()" class="copy-btn w-full bg-white text-black font-bold py-4 rounded-2xl flex justify-center items-center gap-2 hover:bg-gray-200 transition-all">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Копировать ключ
        </button>
    </div>

    <div class="fixed bottom-6 left-4 right-4 flex gap-3 fade-in-up" style="animation-delay: 0.4s">
        <button onclick="sendAction('3m')" class="flex-1 bg-indigo-600/20 border border-indigo-500/30 py-4 rounded-2xl font-semibold text-indigo-300 backdrop-blur-lg">
            Продлить
        </button>
        <button onclick="location.hash='/instructions'" class="flex-1 bg-white/5 border border-white/10 py-4 rounded-2xl font-semibold backdrop-blur-lg text-gray-300">
            Гайды
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#0f0f12';

        // Получение данных из URL
        const params = new URLSearchParams(window.location.search);
        const key = params.get('key') || 'Ключ не найден';
        const expiryTs = params.get('expiry_ts');
        const gb = params.get('gb') || '0';
        const refs = params.get('refs') || '0';

        // Отображение данных
        document.getElementById('vless_key').innerText = decodeURIComponent(key);
        document.getElementById('traffic_usage').innerText = `${gb} GB / ∞`;
        
        if (expiryTs && expiryTs !== '0') {
            const date = new Date(parseInt(expiryTs));
            document.getElementById('expiry_date').innerText = date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
        } else {
            document.getElementById('expiry_date').innerText = "Не активно";
        }

        function copyKey() {
            const keyText = document.getElementById('vless_key').innerText;
            navigator.clipboard.writeText(keyText).then(() => {
                tg.HapticFeedback.notificationOccurred('success');
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '✅ Скопировано!';
                btn.style.background = '#22c55e';
                btn.style.color = 'white';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = 'white';
                    btn.style.color = 'black';
                }, 2000);
            });
        }

        function sendAction(plan) {
            tg.HapticFeedback.impactOccurred('medium');
            tg.sendData(`buy_${plan}_stars`);
        }
    </script>
</body>
</html>
