<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Silence App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
        }
        .status-badge {
            background: #2ecc71;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 14px;
            margin-bottom: 20px;
            display: inline-block;
        }
        .tariff-card {
            background: #252525;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }
        .tariff-card:active { transform: scale(0.98); }
        button {
            background: #0088cc;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
        }
        .limit-info { color: #888; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>VPN Silence</h1>
        <div class="status-badge">Личный кабинет</div>
        
        <div class="tariff-card">
            <h3>30 дней доступа</h3>
            <p style="font-size: 24px; font-weight: bold; color: #0088cc;">300₽</p>
            <button onclick="sendDataToBot(300)">Купить сейчас</button>
            <p class="limit-info">Лимит: до 5 устройств одновременно</p>
        </div>

        <div class="tariff-card">
            <h3>90 дней доступа</h3>
            <p style="font-size: 24px; font-weight: bold; color: #2ecc71;">800₽</p>
            <button style="background: #2ecc71;" onclick="sendDataToBot(800)">Купить со скидкой</button>
            <p class="limit-info">Самый выгодный тариф</p>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на все окно

        function sendDataToBot(price) {
            // Отправляем строку боту
            tg.sendData("buy_" + price);
            // Закрываем приложение (необязательно, но так удобнее пользователю)
            tg.close();
        }
        
        // Цвет кнопки темы Telegram
        document.body.style.backgroundColor = tg.themeParams.bg_color || "#121212";
    </script>
</body>
</html>
