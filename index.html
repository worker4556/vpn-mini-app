<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #1c1c1e);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0; padding: 20px; text-align: center;
        }
        .header { margin-bottom: 25px; }
        .status-badge {
            background: #28a745; color: white; padding: 4px 12px;
            border-radius: 20px; font-size: 12px; display: inline-block; margin-bottom: 10px;
        }
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px;
        }
        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #2c2c2e);
            padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value { font-size: 18px; font-weight: bold; display: block; color: #0088cc; }
        .stat-label { font-size: 11px; color: #8e8e93; text-transform: uppercase; }
        
        .tariff-card {
            background: linear-gradient(145deg, #2c2c2e, #1c1c1e);
            border-radius: 16px; padding: 20px; margin-bottom: 15px;
            border: 1px solid #3a3a3c; transition: transform 0.2s;
        }
        .tariff-card:active { transform: scale(0.98); }
        .price { font-size: 24px; font-weight: 800; margin: 10px 0; }
        
        button {
            background-color: #0088cc; color: white; border: none;
            padding: 12px 24px; border-radius: 10px; font-weight: bold;
            width: 100%; cursor: pointer; font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="status-badge">Система активна</div>
        <h2>Твой VPN Кабинет</h2>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-value">Reality</span>
            <span class="stat-label">Протокол</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">5</span>
            <span class="stat-label">Устройств</span>
        </div>
    </div>

    <div class="tariff-card">
        <div class="stat-label">Тариф "Стандарт"</div>
        <div class="price">300₽ <span style="font-size: 14px; font-weight: normal;">/ мес</span></div>
        <button onclick="buy(300)">Выбрать тариф</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function buy(amount) {
            tg.sendData("buy_" + amount);
        }
    </script>
</body>
</html>
