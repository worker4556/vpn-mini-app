<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VPN Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #1c1c1e);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #8e8e93);
            --button-color: var(--tg-theme-button-color, #0088cc);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #2c2c2e);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }

        .status-badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 0 10px rgba(40, 167, 69, 0.3);
        }

        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--secondary-bg);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 20px;
            font-weight: bold;
            color: var(--button-color);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--hint-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Карточка тарифа */
        .tariff-card {
            background: linear-gradient(145deg, var(--secondary-bg), var(--bg-color));
            width: 100%;
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .tariff-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .tariff-price {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .tariff-price span {
            font-size: 16px;
            font-weight: normal;
            color: var(--hint-color);
        }

        .features {
            list-style: none;
            padding: 0;
            margin: 0 0 25px 0;
            font-size: 14px;
            color: var(--hint-color);
        }

        .features li {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .features li::before {
            content: "✓";
            color: #28a745;
            margin-right: 10px;
            font-weight: bold;
        }

        button {
            background-color: var(--button-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 12px;
            color: var(--hint-color);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="status-badge" id="status-text">ПОДКЛЮЧЕНО</div>
        <h2 style="margin: 0;">VPN Shop</h2>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-value" id="expiry-val">...</span>
            <span class="stat-label">До конца</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="gb-val">...</span>
            <span class="stat-label">Трафик (ГБ)</span>
        </div>
    </div>

    <div class="tariff-card">
        <div class="tariff-title">Премиум Доступ</div>
        <div class="tariff-price">300₽ <span>/ 30 дней</span></div>
        <ul class="features">
            <li>Протокол VLESS + Reality</li>
            <li>Лимит: 5 устройств</li>
            <li>Скорость до 1 Гбит/с</li>
            <li>Маскировка под Microsoft</li>
        </ul>
        <button onclick="sendBuy(300)">Купить подписку</button>
    </div>

    <div class="footer-note">Данные обновляются при каждом открытии</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        
        // Настройка цветов темы Telegram
        tg.ready();

        // 1. Получаем данные из URL (которые мы передали из бота)
        const urlParams = new URLSearchParams(window.location.search);
        const expiry = urlParams.get('expiry') || 'Нет';
        const gb = urlParams.get('gb') || '0.00';

        // 2. Вставляем их на страницу
        document.getElementById('expiry-val').innerText = expiry;
        document.getElementById('gb-val').innerText = gb;

        // Если подписки нет, меняем статус
        if (expiry === 'Нет подписки' || expiry === 'Нет') {
            document.getElementById('status-text').innerText = 'НЕАКТИВЕН';
            document.getElementById('status-text').style.background = '#dc3545';
        }

        // 3. Функция отправки данных боту
        function sendBuy(amount) {
            tg.sendData("buy_" + amount);
            tg.close(); // Закрываем Mini App после нажатия
        }
    </script>
</body>
</html>
