<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Silence VPN Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --accent-gradient: linear-gradient(135deg, #007AFF 0%, #00C6FF 100%);
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
            --apple-blue: #007AFF;
            --apple-red: #FF3B30;
            --apple-green: #30D158;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 122, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 198, 255, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0; padding: 20px;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 16px;
        }

        /* Статус сервера */
        .server-line {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; color: var(--text-secondary); margin-bottom: 15px;
        }
        .online-tag { color: var(--apple-green); display: flex; align-items: center; gap: 4px; font-weight: 600; }
        .online-tag::before { content: ''; width: 6px; height: 6px; background: var(--apple-green); border-radius: 50%; box-shadow: 0 0 8px var(--apple-green); }

        /* Динамический статус */
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 20px;
            font-size: 13px; font-weight: 600; margin-bottom: 12px;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-active { background: var(--apple-green); animation: blink 1.5s infinite; }
        .dot-inactive { background: var(--apple-red); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        h1 { font-size: 36px; font-weight: 700; margin: 0; letter-spacing: -1px; }

        /* Сетка статистики */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px; border-radius: 18px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-box b { display: block; font-size: 20px; margin-bottom: 4px; }
        .stat-box span { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

        .unlimited-track { height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; margin: 16px 0; overflow: hidden; }
        .unlimited-fill { height: 100%; width: 100%; background: var(--accent-gradient); background-size: 200% 100%; animation: flow 3s linear infinite; }
        @keyframes flow { 0% { background-position: 0% 0%; } 100% { background-position: -200% 0%; } }

        .plan-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 16px; border-radius: 16px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border: 2px solid transparent; transition: 0.2s; cursor: pointer;
        }
        .plan-card.active { border-color: var(--apple-blue); background: rgba(0, 122, 255, 0.1); }

        .main-btn {
            background: #FFFFFF; color: #000000;
            width: 100%; padding: 18px; border-radius: 18px;
            border: none; font-size: 17px; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        .main-btn:active { transform: scale(0.97); }

        .ref-banner {
            background: var(--accent-gradient);
            border-radius: 18px; padding: 16px; margin-top: 10px;
            text-align: center; color: #fff; font-weight: 600; font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="server-line">
        <span>Сервер: <b>MSK-RU-01</b></span>
        <span class="online-tag">Онлайн</span>
    </div>

    <div class="status-badge" id="status-badge">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Проверка...</span>
    </div>

    <h1 id="gb-val">0.00 GB</h1>
    <div id="days-left" style="font-size: 14px; margin-top: 4px; font-weight: 500;">Загрузка...</div>

    <div class="unlimited-track"><div class="unlimited-fill"></div></div>

    <div class="stats-grid">
        <div class="stat-box">
            <b id="ref-count">0</b>
            <span>Друзей</span>
        </div>
        <div class="stat-box">
            <b>5/5</b>
            <span>Устройства</span>
        </div>
    </div>
</div>

<div class="card">
    <h3 style="margin: 0 0 16px 0;">Тарифы</h3>
    
    <div class="plan-card active" onclick="selectPlan('3m', this)">
        <div><b>3 Месяца</b><br><small style="color:var(--text-secondary)">+7 дней за друга</small></div>
        <div style="font-weight:700; font-size: 18px;">799₽</div>
    </div>

    <div class="plan-card" onclick="selectPlan('1m', this)">
        <div><b>1 Месяц</b><br><small style="color:var(--text-secondary)">Базовый доступ</small></div>
        <div style="font-weight:700; font-size: 18px;">299₽</div>
    </div>

    <button class="main-btn" onclick="processPayment()">Продолжить</button>
</div>

<div class="ref-banner" onclick="tg.sendData('copy_ref')">
    🎁 Пригласи друга — получи неделю!
</div>

<button class="main-btn" style="background: rgba(255,255,255,0.05); color: #fff; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1);" onclick="copyKey()">
    📋 Копировать мой ключ
</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Получаем данные из URL (передаем их из бота)
    const params = new URLSearchParams(window.location.search);
    const expiryTs = parseInt(params.get('expiry_ts')) || 0;
    const gb = params.get('gb') || '0.00';
    const refs = params.get('refs') || '0';
    const key = params.get('key');

    // Элементы
    const statusText = document.getElementById('status-text');
    const statusBadge = document.getElementById('status-badge');
    const statusDot = document.getElementById('status-dot');
    const daysLeftText = document.getElementById('days-left');

    // Заполнение
    document.getElementById('gb-val').innerText = gb + ' GB';
    document.getElementById('ref-count').innerText = refs;

    // Логика времени и статуса
    const now = Date.now();
    if (expiryTs > now) {
        const diffDays = Math.ceil((expiryTs - now) / (1000 * 60 * 60 * 24));
        statusText.innerText = "Система защищена";
        statusBadge.style.background = "rgba(48, 209, 88, 0.15)";
        statusBadge.style.color = "#30D158";
        statusDot.className = "status-dot dot-active";
        daysLeftText.innerText = `Осталось: ${diffDays} дн.`;
        daysLeftText.style.color = "var(--apple-green)";
    } else {
        statusText.innerText = "Защита отключена";
        statusBadge.style.background = "rgba(255, 59, 48, 0.15)";
        statusBadge.style.color = "#FF3B30";
        statusDot.className = "status-dot dot-inactive";
        daysLeftText.innerText = "Подписка истекла";
        daysLeftText.style.color = "var(--apple-red)";
    }

    let selectedPlan = '3m';

    function selectPlan(plan, el) {
        selectedPlan = plan;
        document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        tg.HapticFeedback.impactOccurred('medium');
    }

    function processPayment() {
        tg.HapticFeedback.notificationOccurred('success');
        tg.sendData(`buy_${selectedPlan}`);
    }

    function copyKey() {
        if (key && key !== 'empty') {
            navigator.clipboard.writeText(decodeURIComponent(key)).then(() => {
                tg.showAlert('Ключ скопирован!');
            });
        } else {
            tg.showAlert('Сначала активируйте подписку или тест.');
        }
    }
</script>
</body>
</html>
